{% extends "base.html" %}

{% block title %}Raise Maintenance Ticket - Industrial Analyzer Management System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-plus-circle"></i> Raise Maintenance Ticket</h2>
    <a href="{{ url_for('maintenance.index') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</div>

<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="sensor_id" class="form-label">Sensor *</label>
                    <select class="form-select" id="sensor_id" name="sensor_id" required>
                        <option value="">Select Sensor</option>
                        {% for sensor in sensors %}
                        <option value="{{ sensor.sensor_id }}">{{ sensor.sensor_id }} - {{ sensor.sensor_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="priority" class="form-label">Priority *</label>
                    <select class="form-select" id="priority" name="priority" required>
                        <option value="">Select Priority</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="issue" class="form-label">Issue *</label>
                <input type="text" class="form-control" id="issue" name="issue" required>
            </div>
            
            <div class="mb-3">
                <label for="assigned_engineer" class="form-label">Assigned Engineer</label>
                <input type="text" class="form-control" id="assigned_engineer" name="assigned_engineer">
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4"></textarea>
            </div>
            
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="{{ url_for('maintenance.index') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Raise Ticket</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
